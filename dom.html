<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Learn Document Object Model</h1>

    <h1 id="head">Target me using ID</h1>

    <div class="card">Target me using class 1</div>
    <div class="card">Target me using class 2</div>

    <article>Target me using tagName</article>
    <article>Target me using tagName</article>

    <!-- EVENTS -->

    <button onclick="singleclick()">single click</button>

    <button ondblclick="doubleclick()">double click</button>

    <button id="btn1">click me</button>

    <button id="btn2">double click me</button>

    <section>violet</section>
    <section>indigo</section>
    <section>blue</section>
    <section>green</section>
    <section>yellow</section>
    <section>orange</section>
    <section>red</section>

    <!-- FORM -->
    <form id="signup-form">
      <input
        type="text"
        required
        name="name"
        id="name"
        placeholder="Enter Name"
      />
      <br />
      <input
        type="text"
        required
        name="email"
        id="email"
        placeholder="Enter Email"
      />
      <br />
      <input
        type="text"
        required
        name="password"
        id="password"
        placeholder="Enter Password"
      />
      <br />
      <button type="submit">Submit</button>
    </form>

    <script src="./dom.js" defer></script>
  </body>
</html>
