<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup – Q-Shop</title>
    <link rel="stylesheet" href="../styles/index.css" />
    <script src="../scripts/signup.js" defer></script>
  </head>
  <body>
    <main class="container">
      <header class="navbar glass">
        <div class="logo">🛍️ Q-Shop</div>
        <nav>
          <a href="../index.html">🏠 Home</a>
          <a href="./login.html">🔐 Login</a>
          <a href="./signup.html">📝 Signup</a>
        </nav>
      </header>

      <div class="form-card">
        <h2>📝 Join Q-Shop</h2>
        <p>Create your free account now</p>
        <form id="signup-form">
          <div class="input-group">
            <label>👤 Username</label>
            <input type="text" name="username" id="username" placeholder="cool_user123" required />
          </div>
          <div class="input-group">
            <label>📧 Email</label>
            <input type="email" name="email" id="email" placeholder="hello@example.com" required />
          </div>
          <div class="input-group">
            <label>🔒 Password</label>
            <input type="password" name="password" id="password" placeholder="create a strong password" required />
          </div>
          <button type="submit">✨ Signup</button>
        </form>
        <p class="form-footer">Already have an account? <a href="./login.html">Log in →</a></p>
      </div>

      <footer class="footer">
        <p>© 2025 Q-Shop | join the family 🚀</p>
      </footer>
    </main>
  </body>
</html>
